<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>For My Brother 🎉</title>
  <style>
    body {
      margin: 0;
      font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
      text-align: center;
      color: white;
      background: linear-gradient(135deg, #1e3c72, #2a5298);
      overflow-x: hidden;
      height: 100vh;
    }

    .page {
      display: none;
      padding-top: 60px;
      animation: fadeIn 0.8s ease;
    }

    .active { display: block; }

    @keyframes fadeIn {
      from { opacity: 0; transform: translateY(10px); }
      to { opacity: 1; transform: translateY(0); }
    }

    .card {
      background: rgba(255, 255, 255, 0.1);
      backdrop-filter: blur(10px);
      padding: 30px;
      margin: auto;
      border-radius: 20px;
      width: 85%;
      max-width: 380px;
      box-shadow: 0 10px 30px rgba(0,0,0,0.3);
      border: 1px solid rgba(255,255,255,0.2);
    }

    input {
      padding: 12px;
      width: 120px;
      border-radius: 10px;
      border: none;
      font-size: 1.2rem;
      text-align: center;
      margin-bottom: 20px;
    }

    button {
      background: #00d2ff;
      color: white;
      padding: 12px 25px;
      border: none;
      border-radius: 10px;
      font-weight: bold;
      cursor: pointer;
      transition: 0.3s;
    }

    button:hover { transform: scale(1.05); background: #3a7bd5; }

    .img-gallery img {
      width: 100%;
      border-radius: 15px;
      margin-top: 15px;
      box-shadow: 0 5px 15px rgba(0,0,0,0.2);
    }

    #cake { width: 180px; cursor: pointer; margin-top: 20px; }
    .sparkle { position: absolute; width: 6px; height: 6px; border-radius: 50%; background: gold; }

    /* Overlay to start audio */
    #startOverlay {
      position: fixed; top: 0; left: 0; width: 100%; height: 100%;
      background: #1e3c72; z-index: 100; display: flex;
      flex-direction: column; justify-content: center; align-items: center;
    }
  </style>
</head>
<body>

  <div id="startOverlay">
    <h1>Brother's Birthday Surprise 🎁</h1>
    <button onclick="initSite()">Open Invitation</button>
  </div>

  <div id="page1" class="page">
    <div class="card">
      <h2>🔐 Secret Access</h2>
      <p>Enter the 4-digit code:</p>
      <input type="password" id="passInput" maxlength="4" placeholder="0000">
      <br>
      <button onclick="checkPassword()">Unlock</button>
      <p id="errorMsg" style="color: #ff4b2b; display: none; margin-top: 10px;">Wrong Password!</p>
    </div>
  </div>

  <div id="page2" class="page">
    <div class="card">
      <h1>🎂 Happy Birthday Bro!</h1>
      <p>"Wishing you a year full of success, health, and happiness. You're not just my brother, but my best friend!"</p>
      <p><strong>- From Tejas 💙</strong></p>
      <button onclick="showPage('page3')">See Our Memories ➡️</button>
    </div>
  </div>

  <div id="page3" class="page">
    <div class="card">
      <h2>📸 Memories</h2>
      <div class="img-gallery">
        <img src="https://picsum.photos/400/300?random=1" alt="Memory">
      </div>
      
      <div style="margin-top: 30px;">
        <h3>Blow the candles! 🕯️</h3>
        <img id="cake" src="https://img.icons8.com/emoji/96/000000/birthday-cake-emoji.png" onclick="blowCandle()">
        <div id="flames">🔥 🔥 🔥</div>
        <p id="wishMsg" style="display:none; color: #00d2ff; font-weight: bold;">✨ Wish Granted! ✨</p>
      </div>
    </div>
  </div>

  <audio id="birthdayMusic" loop>
    <source src="https://www.soundhelix.com/examples/mp3/SoundHelix-Song-1.mp3" type="audio/mpeg">
  </audio>

  <script>
    const music = document.getElementById('birthdayMusic');

    function initSite() {
      document.getElementById('startOverlay').style.display = 'none';
      document.getElementById('page1').classList.add('active');
    }

    function checkPassword() {
      const input = document.getElementById('passInput').value;
      if (input === "1234") {
        music.play();
        showPage('page2');
      } else {
        document.getElementById('errorMsg').style.display = 'block';
      }
    }

    function showPage(pageId) {
      document.querySelectorAll('.page').forEach(p => p.classList.remove('active'));
      document.getElementById(pageId).classList.add('active');
    }

    function blowCandle() {
      document.getElementById('flames').style.display = 'none';
      document.getElementById('wishMsg').style.display = 'block';
      createConfetti();
    }

    function createConfetti() {
      for(let i=0; i<50; i++) {
        const confetti = document.createElement('div');
        confetti.className = 'sparkle';
        confetti.style.left = Math.random() * window.innerWidth + 'px';
        confetti.style.top = window.innerHeight + 'px';
        confetti.style.background = `hsl(${Math.random()*360}, 70%, 60%)`;
        document.body.appendChild(confetti);
        
        confetti.animate([
          { transform: `translateY(0) rotate(0deg)`, opacity: 1 },
          { transform: `translateY(-${window.innerHeight}px) rotate(720deg)`, opacity: 0 }
        ], { duration: 2000 + Math.random() * 3000 });
        
        setTimeout(() => confetti.remove(), 5000);
      }
    }
  </script>
</body>
</html>
